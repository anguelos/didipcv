<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Layout Analysis</title>
  <desc id="desc">Parchment with detected text block, ornament, and seal regions</desc>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f7f0da" stroke="#7b5b35" stroke-width="2"/>

  <!-- Parchment -->
  <path
    d="M20 14
       h24
       c2 0 3 1.2 3 3
       v26
       c0 2-1 3-3 3
       h-3
       l-2.3 4-2.3-4h-16
       c-2 0-3-1-3-3
       v-26
       c0-1.8 1.2-3 3-3z"
    fill="#fdf5e6"
    stroke="#7b5b35"
    stroke-width="1.8"
  />

  <!-- Big text block (detected area) -->
  <rect x="22.5" y="18.5" width="15" height="11"
        fill="none" stroke="#5a4631" stroke-width="1.4" stroke-dasharray="2 2" rx="1"/>

  <!-- Text lines inside block -->
  <line x1="24" y1="21" x2="36" y2="21" stroke="#b38a5a" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="24" y1="23.5" x2="35.5" y2="23.5" stroke="#b38a5a" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="24" y1="26" x2="34.5" y2="26" stroke="#b38a5a" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Ornamental star (detected ornament) -->
  <polygon
    points="40,20 41.5,22.2 44,22.8 42.3,24.7 42.6,27.2 40,26.2 37.4,27.2 37.7,24.7 36,22.8 38.5,22.2"
    fill="#f7e4bf" stroke="#7b5b35" stroke-width="1"
  />

  <!-- Ornament detection box (corner brackets) -->
  <path d="M36 19 h3
           M36 19 v3
           M44 19 h-3
           M44 19 v3
           M36 27 h3
           M36 27 v-3
           M44 27 h-3
           M44 27 v-3"
        fill="none" stroke="#5a4631" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Seal (circle) -->
  <circle cx="27" cy="34" r="3"
          fill="#f7e4bf" stroke="#7b5b35" stroke-width="1.2"/>

  <!-- Seal detection box -->
  <path d="M22.5 30.5 h3
           M22.5 30.5 v3
           M31.5 30.5 h-3
           M31.5 30.5 v3
           M22.5 37.5 h3
           M22.5 37.5 v-3
           M31.5 37.5 h-3
           M31.5 37.5 v-3"
        fill="none" stroke="#5a4631" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Small extra block (another region) -->
  <rect x="33.5" y="32" width="9" height="6"
        fill="none" stroke="#5a4631" stroke-width="1.2" stroke-dasharray="2 2" rx="1"/>

  <!-- Hint of page baseline -->
  <line x1="22" y1="42.5" x2="40" y2="42.5" stroke="#d1b58a" stroke-width="1" stroke-linecap="round"/>
</svg>

