<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Archive Browser</title>
  <desc id="desc">Icon of a medieval parchment with a magnifying glass</desc>

  <!-- Background circle (optional, for consistency in a set) -->
  <circle cx="32" cy="32" r="30" fill="#f7f0da" stroke="#7b5b35" stroke-width="2"/>

  <!-- Parchment body -->
  <path
    d="M20 15
       h20
       c2 0 3 1 3 3
       v20
       c0 2-1 3-3 3
       h-2
       l-2 4-2-4h-12
       c-2 0-3-1-3-3
       v-20
       c0-2 1-3 3-3z"
    fill="#fdf5e6"
    stroke="#7b5b35"
    stroke-width="1.6"
  />

  <!-- Parchment top/bottom roughness -->
  <path
    d="M20 15
       c1 2 2 3 4 3
       s3-1 5-3
       s4 3 7 3
       s3-1 4-3"
    fill="none"
    stroke="#d1b58a"
    stroke-width="1.2"
  />
  <path
    d="M20 41
       c1 1 2 2 4 2
       s3-1 5-2
       s4 2 7 2
       s3-1 4-2"
    fill="none"
    stroke="#d1b58a"
    stroke-width="1.2"
  />

  <!-- Text lines on parchment -->
  <line x1="23" y1="22" x2="36" y2="22" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="23" y1="26" x2="37" y2="26" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="23" y1="30" x2="35" y2="30" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="23" y1="34" x2="33" y2="34" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Magnifying glass for "browse" -->
  <circle cx="40" cy="38" r="5" fill="none" stroke="#5a4631" stroke-width="1.8"/>
  <line x1="43.5" y1="41.5" x2="47" y2="45" stroke="#5a4631" stroke-width="1.8" stroke-linecap="round"/>

</svg>

