<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Parchment List View</title>
  <desc id="desc">Icon of a parchment showing list rows</desc>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f7f0da" stroke="#7b5b35" stroke-width="2"/>

  <!-- Parchment -->
  <path
    d="M20 16
       h24
       c1.8 0 3 1.2 3 3
       v26
       c0 1.8-1.2 3-3 3
       h-3
       l-2.5 4-2.5-4h-16
       c-1.8 0-3-1.2-3-3
       v-26
       c0-1.8 1.2-3 3-3z"
    fill="#fdf5e6"
    stroke="#7b5b35"
    stroke-width="1.8"
  />

  <!-- List bullets -->
  <circle cx="24" cy="23" r="1.5" fill="#7b5b35"/>
  <circle cx="24" cy="28" r="1.5" fill="#7b5b35"/>
  <circle cx="24" cy="33" r="1.5" fill="#7b5b35"/>
  <circle cx="24" cy="38" r="1.5" fill="#7b5b35"/>

  <!-- List lines -->
  <line x1="28" y1="23" x2="40" y2="23" stroke="#b38a5a" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="40" y2="28" stroke="#b38a5a" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="33" x2="38" y2="33" stroke="#b38a5a" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="36" y2="38" stroke="#b38a5a" stroke-width="1.4" stroke-linecap="round"/>

</svg>

