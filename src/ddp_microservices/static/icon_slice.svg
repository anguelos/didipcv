<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Cloud Slice Download</title>
  <desc id="desc">Cloud with a fragment of medieval parchment and a download arrow</desc>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f7f0da" stroke="#7b5b35" stroke-width="2"/>

  <!-- Cloud -->
  <path d="
    M22 26
    a6 6 0 0 1 11 -3
    a5 5 0 0 1 9 3
    h3
    a5 5 0 0 1 0 10
    h-23
    a5 5 0 0 1 0 -10
  "
    fill="#ffffff"
    stroke="#7b5b35"
    stroke-width="1.8"
  />

  <!-- Parchment slice -->
  <path d="M26 32 h12 c2 0 3 1 3 3 v8 c0 2-1 3-3 3 h-2 l-1.6 2-1.6-2 h-8 c-2 0-3-1-3-3 v-8 c0-2 1-3 3-3z"
        fill="#fdf5e6"
        stroke="#7b5b35"
        stroke-width="1.5"/>

  <!-- Parchment lines -->
  <line x1="29" y1="36" x2="37" y2="36" stroke="#b38a5a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="29" y1="39" x2="36" y2="39" stroke="#b38a5a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Download arrow -->
  <line x1="32" y1="44" x2="32" y2="50" stroke="#5a4631" stroke-width="2" stroke-linecap="round"/>
  <polyline points="28,46 32,50 36,46"
            fill="none" stroke="#5a4631" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

