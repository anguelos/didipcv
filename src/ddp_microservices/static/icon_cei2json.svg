<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Archive Text Search</title>
  <desc id="desc">Parchment with a magnifying glass highlighting a line of text</desc>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f7f0da" stroke="#7b5b35" stroke-width="2"/>

  <!-- Parchment -->
  <path
    d="M20 16
       h24
       c2 0 3 1.2 3 3
       v22
       c0 2-1 3-3 3
       h-3
       l-2.3 3.8-2.3-3.8h-16
       c-2 0-3-1-3-3
       v-22
       c0-1.8 1.2-3 3-3z"
    fill="#fdf5e6"
    stroke="#7b5b35"
    stroke-width="1.8"
  />

  <!-- Text lines -->
  <line x1="23" y1="22" x2="38" y2="22" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="23" y1="26" x2="39" y2="26" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Highlighted "hit" line -->
  <line x1="23" y1="30" x2="39" y2="30" stroke="#5a4631" stroke-width="1.6" stroke-linecap="round"/>

  <line x1="23" y1="34" x2="36" y2="34" stroke="#b38a5a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Magnifying glass -->
  <circle cx="40" cy="40" r="5.5" fill="none" stroke="#5a4631" stroke-width="2"/>
  <line x1="43.8" y1="43.8" x2="47" y2="47"
        stroke="#5a4631" stroke-width="2" stroke-linecap="round"/>

  <!-- Little "text" hint inside the glass -->
  <line x1="37.5" y1="39" x2="42.5" y2="39" stroke="#b38a5a" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="38" y1="41" x2="41" y2="41" stroke="#b38a5a" stroke-width="1.1" stroke-linecap="round"/>
</svg>

